server {
    listen 80;
    index index.html index.htm index.nginx-debian.html index.php index.html;
    server_name auexch.yourdesign.live;


    location / {
        proxy_pass http://192.168.1.43:4000/;  # Replace with the port your Next.js app is running on
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~/_next/static/ {
        proxy_pass http://192.168.1.43:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

     location ~/api {
        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:3010;
        add_header Cache-Control "max-age=14400";

    }

    location ~/app {
        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:2079;


    }
    location ~/get_market_rates {

        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:9004;
    }

    location /all-sports {
        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:9005;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location /event-market-sports {
        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:9007;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

   location /market-based-sports {
        proxy_pass http://btf-api-nlb-1f730447fe6afdb6.elb.eu-west-1.amazonaws.com:9006;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
